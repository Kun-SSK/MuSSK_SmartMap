<!doctype html>
<html lang="th">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>ระบบแผนที่สารสนเทศภูมิศาสตร์ - เทศบาลเมืองศรีสะเกษ</title>
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet-measure/dist/leaflet-measure.css">
        
        <style>
            html, body, #map {
                width: 100%;
                height: 100%;
                padding: 0;
                margin: 0;
                background-color: #f4f4f4;
            }
            /* ซ่อนแผนที่และองค์ประกอบอื่นไว้ก่อนตรวจสอบรหัสผ่าน */
            #map, .print-button, .map-logo {
                display: none;
            }
            /* ปุ่ม Print */
            .print-button {
                position: absolute; top: 70px; left: 10px; z-index: 1000;
                background: white; padding: 5px 12px; border: 2px solid rgba(0,0,0,0.2);
                border-radius: 4px; cursor: pointer; font-weight: bold; font-family: sans-serif;
            }
            .print-button:hover { background: #f0f0f0; }
            /* โลโก้เทศบาล */
            .map-logo {
                position: absolute; bottom: 25px; right: 10px; z-index: 1000;
                width: 85px; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
            }
            /* ปุ่มนำทางใน Popup */
            .btn-navigation {
                display: inline-block; margin-top: 8px; padding: 8px 15px;
                background-color: #4285F4; color: white !important;
                text-decoration: none; border-radius: 4px; font-weight: bold;
            }
            @media print { .print-button, .leaflet-control-zoom, .leaflet-control-layers, .leaflet-control-measure { display: none !important; } }
        </style>
    </head>
    <body>

        <div id="map"></div>
        <button id="printBtn" class="print-button" onclick="window.print()"><i class="fa fa-print"></i> พิมพ์แผนที่</button>
        <img id="logoImg" src="Logo เทศบาลเมืองศรีสะเกษ.png" class="map-logo" alt="Sisaket Municipality Logo">

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="https://unpkg.com/leaflet-measure/dist/leaflet-measure.js"></script>
        
        <script src="data/Municipal_Boundary_1.js"></script>
        <script src="data/gis_road_2.js"></script>
        <script src="data/gis_waterway_3.js"></script>
        <script src="data/community_Boundary_4.js"></script>
        <script src="data/2069_5.js"></script>
        <script src="data/ZoneA_6.js"></script>

        <script>
            // ==========================================
            // 1. ระบบรักษาความปลอดภัย (Password Protection)
            // ==========================================
            var pass = prompt("กรุณาใส่รหัสผ่านเพื่อเข้าชมแผนที่เทศบาล:");
            
            // ตรวจสอบรหัส 1234 (Base64: MTIzNA==)
            if (window.btoa(pass) !== "MTIzNA==") {
                alert("รหัสผ่านไม่ถูกต้อง ระบบจะปิดการทำงาน");
                document.body.innerHTML = "<div style='text-align:center; margin-top:20%; font-family:sans-serif;'>" +
                                          "<h1 style='color:#d9534f;'>Access Denied</h1>" +
                                          "<p>กรุณาติดต่อเจ้าหน้าที่ IT เทศบาลเมืองศรีสะเกษ เพื่อขอสิทธิ์เข้าใช้งาน</p></div>";
                throw new Error("Incorrect Password");
            } else {
                // แสดงผลเมื่อรหัสถูกต้อง
                document.getElementById('map').style.display = 'block';
                document.getElementById('printBtn').style.display = 'block';
                document.getElementById('logoImg').style.display = 'block';
            }

            // ==========================================
            // 2. ตั้งค่าแผนที่และ Base Layers
            // ==========================================
            var map = L.map('map', {
                zoomControl: false, maxZoom: 28, minZoom: 1
            }).fitBounds([[15.103522274196575,104.33796229180007],[15.106186210215954,104.34228049460745]]);
            
            // Base Layers
            var layer_OSM = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: 'OSM'
            }).addTo(map);
            
            var layer_GoogleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                attribution: 'Google Maps'
            });

            // ฟังก์ชันทำความสะอาด Popup (จัดการแถวว่าง)
            function removeEmptyRowsFromPopupContent(content, feature) {
                var tempDiv = document.createElement('div');
                tempDiv.innerHTML = content;
                var rows = tempDiv.querySelectorAll('tr');
                for (var i = 0; i < rows.length; i++) {
                    var td = rows[i].querySelector('td.visible-with-data');
                    var key = td ? td.id : '';
                    if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                        rows[i].parentNode.removeChild(rows[i]);
                    }
                }
                return tempDiv.innerHTML;
            }

        // --- ฟังก์ชันสำหรับสร้าง Popup จากข้อมูล Attribute ---
        function pop_generic(feature, layer) {
        var popupContent = '<table style="width:100%; border-collapse:collapse; font-family:sans-serif; font-size:13px;">';
        var fieldsToShow = [];
    
        // --- ตรวจสอบเงื่อนไขการเลือก Attribute ตามโครงสร้างข้อมูลจริง ---
        // หมายเหตุ: ชื่อคอลัมน์ใน "" ต้องตรงกับหัวตารางในไฟล์ .js (QGIS) เป๊ะๆ
        if (feature.properties.community) { 
            // 2. ข้อมูลชุมชน (เช็คว่ามีคอลัมน์ community ไหม)
            fieldsToShow = ["Id", "community"]; 
        } 
        else if (feature.properties.Name) { 
            // 3. เสาไฟฟ้า (เช็คว่ามีคอลัมน์ Road_ID ไหม)
            fieldsToShow = ["Name", "description"]; 
        } 
        else {
            // 4. Layer อื่นๆ หรือถ้าไม่ตรงเงื่อนไขเลย ให้โชว์ 3 คอลัมน์แรกที่มี
            fieldsToShow = Object.keys(feature.properties).slice(0, 3); 
        }
    
        // วนลูปสร้างตารางข้อมูล
        fieldsToShow.forEach(function(key) {
            if (feature.properties[key] !== undefined) {
                var value = feature.properties[key] !== null ? feature.properties[key] : '-';
                popupContent += '<tr>' +
                                '<th style="text-align:left; padding:6px; border-bottom:1px solid #eee; background:#f4f4f4;">' + key + '</th>' +
                                '<td style="padding:6px; border-bottom:1px solid #eee;">' + value + '</td>' +
                                '</tr>';
            }
        });
        popupContent += '</table>';

    // --- ส่วนคำนวณพิกัดสำหรับปุ่มนำทาง ---
    var lat = null, lng = null;
    if (layer.getLatLng) { // สำหรับจุด (Markers)
        lat = layer.getLatLng().lat;
        lng = layer.getLatLng().lng;
    } else if (layer.getBounds) { // สำหรับเส้นหรือพื้นที่ (Polygons/Lines)
        var center = layer.getBounds().getCenter();
        lat = center.lat;
        lng = center.lng;
    }

    if (lat && lng) {
        // ปรับ URL ใหม่เพื่อแสดงการจราจรและเส้นทางที่เร็วที่สุด
        var googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving&layer=traffic`;
        
        popupContent += `<div style="text-align:center; margin-top:10px;">
                            <a href="${googleMapsUrl}" target="_blank" class="btn-navigation" style="background-color: #1a73e8; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; font-weight: bold;">
                            <i class="fa fa-map-signs"></i> นำทาง (เร็วที่สุด + จราจร)</a>
                         </div>`;
    }
    layer.bindPopup(popupContent, {maxWidth: 280});
    }

        // --- โหลดข้อมูล Layer พร้อมเรียกใช้ฟังก์ชัน Popup ---

        var layer_Municipal_Boundary_1 = L.geoJson(json_Municipal_Boundary_1, { 
            style: { color: "#333", weight: 2, fillOpacity: 0.1 },
            onEachFeature: pop_generic 
        }).addTo(map);

        var layer_gis_road_2 = L.geoJson(json_gis_road_2, { 
            style: { color: "blue", weight: 1.5 },
            onEachFeature: pop_generic 
        }).addTo(map);

        var layer_gis_waterway_3 = L.geoJson(json_gis_waterway_3, { 
            style: { color: "#3bcdd7", weight: 1.5 },
            onEachFeature: pop_generic 
        }).addTo(map);

        var layer_community_Boundary_4 = L.geoJson(json_community_Boundary_4, { 
            style: { color: "purple", weight: 1.5, fillOpacity: 0.2 },
            onEachFeature: pop_generic 
        }).addTo(map);

        var layer_ZoneA_6 = L.geoJson(json_ZoneA_6, {
            pointToLayer: function (f, l) {
                return L.circleMarker(l, { radius: 6, fillColor: "#ff7800", color: "#000", weight: 1, fillOpacity: 0.9 });
            },
            onEachFeature: pop_generic
        }).addTo(map);

        var layer_2069_5 = L.geoJson(json_2069_5, {
            pointToLayer: function (f, l) {
                return L.circleMarker(l, { radius: 6, fillColor: "#6d7a7d", color: "#000", weight: 1, fillOpacity: 0.9 });
            },
            onEachFeature: pop_generic 
        }).addTo(map);

        // ==========================================
        // 5. แผงควบคุม (พร้อมใส่ Icon HTML)
        // ==========================================
        var baseMaps = {
            "แผนที่ถนน (OSM)": layer_OSM,
            "ดาวเทียม (Google Earth)": layer_GoogleSatellite
        };
        
        var overlayMaps = {
            '<i class="fa fa-square" style="color: rgba(141,90,153,1.0)"></i> ขอบเขตเทศบาล': layer_Municipal_Boundary_1,
            '<i class="fa fa-minus" style="color: blue"></i> โครงข่ายถนน': layer_gis_road_2,
            '<i class="fa fa-minus" style="color: #3bcdd7"></i> เส้นทางน้ำ': layer_gis_waterway_3,
            '<i class="fa fa-square" style="color: purple; opacity: 0.5"></i> ชุมชน': layer_community_Boundary_4,
            '<i class="fa fa-circle" style="color: #ff7800"></i> เสาไฟฟ้า (Zone A)': layer_ZoneA_6,
            '<i class="fa fa-circle" style="color: #6d7a7d"></i> เสาไฟฟ้า (ระยะที่ 2)': layer_2069_5
        };
        
        L.control.layers(baseMaps, overlayMaps, {collapsed: false}).addTo(map);
        L.control.zoom({ position: 'topleft' }).addTo(map);
        new L.Control.Measure({ primaryLengthUnit: 'meters', localization: 'th' }).addTo(map);
         </script>
    </body>
</html>
