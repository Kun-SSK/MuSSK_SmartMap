<!doctype html>
<html lang="th">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>ระบบแผนที่สารสนเทศภูมิศาสตร์ - เทศบาลเมืองศรีสะเกษ</title>
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet-measure/dist/leaflet-measure.css">
        
        <style>
            html, body, #map {
                width: 100%;
                height: 100%;
                padding: 0;
                margin: 0;
                background-color: #f4f4f4;
            }
            /* ซ่อนแผนที่และองค์ประกอบอื่นไว้ก่อนตรวจสอบรหัสผ่าน */
            #map, .print-button, .map-logo {
                display: none;
            }
            /* ปุ่ม Print */
            .print-button {
                position: absolute; top: 70px; left: 10px; z-index: 1000;
                background: white; padding: 5px 12px; border: 2px solid rgba(0,0,0,0.2);
                border-radius: 4px; cursor: pointer; font-weight: bold; font-family: sans-serif;
            }
            .print-button:hover { background: #f0f0f0; }
            /* โลโก้เทศบาล */
            .map-logo {
                position: absolute; bottom: 25px; right: 10px; z-index: 1000;
                width: 85px; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
            }
            /* ปุ่มนำทางใน Popup */
            .btn-navigation {
                display: inline-block; margin-top: 8px; padding: 8px 15px;
                background-color: #4285F4; color: white !important;
                text-decoration: none; border-radius: 4px; font-weight: bold;
            }
            @media print { .print-button, .leaflet-control-zoom, .leaflet-control-layers, .leaflet-control-measure { display: none !important; } }
        </style>
    </head>
    <body>

        <div id="map"></div>
        <button id="printBtn" class="print-button" onclick="window.print()"><i class="fa fa-print"></i> พิมพ์แผนที่</button>
        <img id="logoImg" src="Logo เทศบาลเมืองศรีสะเกษ.png" class="map-logo" alt="Sisaket Municipality Logo">

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="https://unpkg.com/leaflet-measure/dist/leaflet-measure.js"></script>
        
        <script src="data/Municipal_Boundary_1.js"></script>
        <script src="data/gis_road_2.js"></script>
        <script src="data/gis_waterway_3.js"></script>
        <script src="data/community_Boundary_4.js"></script>
        <script src="data/2069_5.js"></script>
        <script src="data/ZoneA_6.js"></script>

        <script>
            // ==========================================
            // 1. ระบบรักษาความปลอดภัย (Password Protection)
            // ==========================================
            var pass = prompt("กรุณาใส่รหัสผ่านเพื่อเข้าชมแผนที่เทศบาล:");
            
            // ตรวจสอบรหัส 1234 (Base64: MTIzNA==)
            if (window.btoa(pass) !== "MTIzNA==") {
                alert("รหัสผ่านไม่ถูกต้อง ระบบจะปิดการทำงาน");
                document.body.innerHTML = "<div style='text-align:center; margin-top:20%; font-family:sans-serif;'>" +
                                          "<h1 style='color:#d9534f;'>Access Denied</h1>" +
                                          "<p>กรุณาติดต่อเจ้าหน้าที่ IT เทศบาลเมืองศรีสะเกษ เพื่อขอสิทธิ์เข้าใช้งาน</p></div>";
                throw new Error("Incorrect Password");
            } else {
                // แสดงผลเมื่อรหัสถูกต้อง
                document.getElementById('map').style.display = 'block';
                document.getElementById('printBtn').style.display = 'block';
                document.getElementById('logoImg').style.display = 'block';
            }

            // ==========================================
            // 2. ตั้งค่าแผนที่พื้นฐาน
            // ==========================================
            var map = L.map('map', {
                zoomControl:false, maxZoom:28, minZoom:1
            }).fitBounds([[15.103522274196575,104.33796229180007],[15.106186210215954,104.34228049460745]]);
            
            var hash = new L.Hash(map);
            map.attributionControl.setPrefix('GIS Sisaket Municipality');
            var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});

            // ฟังก์ชันทำความสะอาด Popup (จัดการแถวว่าง)
            function removeEmptyRowsFromPopupContent(content, feature) {
                var tempDiv = document.createElement('div');
                tempDiv.innerHTML = content;
                var rows = tempDiv.querySelectorAll('tr');
                for (var i = 0; i < rows.length; i++) {
                    var td = rows[i].querySelector('td.visible-with-data');
                    var key = td ? td.id : '';
                    if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                        rows[i].parentNode.removeChild(rows[i]);
                    }
                }
                return tempDiv.innerHTML;
            }

            // Base Layer
            map.createPane('pane_OpenStreetMap_0');
            map.getPane('pane_OpenStreetMap_0').style.zIndex = 400;
            var layer_OpenStreetMap_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                pane: 'pane_OpenStreetMap_0',
                opacity: 1.0,
                minZoom: 1,
                maxZoom: 28
            }).addTo(map);

            // ==========================================
            // 3. การจัดการข้อมูล Layer (GeoJSON)
            // ==========================================
            
            // -- ขอบเขตเทศบาล --
            map.createPane('pane_Municipal_Boundary_1');
            map.getPane('pane_Municipal_Boundary_1').style.zIndex = 401;
            var layer_Municipal_Boundary_1 = new L.geoJson(json_Municipal_Boundary_1, {
                pane: 'pane_Municipal_Boundary_1',
                style: { opacity: 1, color: 'rgba(35,35,35,1.0)', weight: 1, fill: true, fillOpacity: 0.1, fillColor: 'rgba(141,90,153,1.0)' }
            }).addTo(map);

            // -- โครงข่ายถนน --
            map.createPane('pane_gis_road_2');
            map.getPane('pane_gis_road_2').style.zIndex = 402;
            var layer_gis_road_2 = new L.geoJson(json_gis_road_2, {
                pane: 'pane_gis_road_2',
                style: { color: 'rgba(46,60,243,1.0)', weight: 1.0 }
            }).addTo(map);

            // -- เส้นทางน้ำ --
            map.createPane('pane_gis_waterway_3');
            map.getPane('pane_gis_waterway_3').style.zIndex = 403;
            var layer_gis_waterway_3 = new L.geoJson(json_gis_waterway_3, {
                pane: 'pane_gis_waterway_3',
                style: { color: 'rgba(59,205,215,1.0)', weight: 2.0 }
            }).addTo(map);

            // -- ชุมชน --
            map.createPane('pane_community_Boundary_4');
            map.getPane('pane_community_Boundary_4').style.zIndex = 404;
            var layer_community_Boundary_4 = new L.geoJson(json_community_Boundary_4, {
                pane: 'pane_community_Boundary_4',
                style: { color: 'rgba(35,35,35,1.0)', weight: 2.0, fill: true, fillOpacity: 0.2, fillColor: 'rgba(222,136,221,1.0)' }
            }).addTo(map);

            // -- ข้อมูลจุดเสาไฟฟ้า (Markers) --
            var layer_2069_5 = new L.geoJson(json_2069_5, {
                pointToLayer: function (feature, latlng) {
                    return L.circleMarker(latlng, { radius: 4, fillColor: 'rgba(109,122,125,1.0)', color: '#000', weight: 1, fillOpacity: 1 });
                }
            }).addTo(map);

            var layer_ZoneA_6 = new L.geoJson(json_ZoneA_6, {
                pointToLayer: function (feature, latlng) {
                    return L.circleMarker(latlng, { radius: 4, fillColor: 'rgba(255,127,0,1.0)', color: '#000', weight: 1, fillOpacity: 1 });
                }
            }).addTo(map);

            // ==========================================
            // 4. ฟีเจอร์ใหม่: คลิกตำแหน่งเพื่อนำทาง (Google Maps)
            // ==========================================
            var navPopup = L.popup();
            map.on('click', function(e) {
                var lat = e.latlng.lat;
                var lng = e.latlng.lng;
                var googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;

                var content = `<div style="text-align:center; font-family:sans-serif;">
                                <strong>พิกัด: ${lat.toFixed(6)}, ${lng.toFixed(6)}</strong><br>
                                <a href="${googleMapsUrl}" target="_blank" class="btn-navigation">
                                <i class="fa fa-location-arrow"></i> นำทางด้วย Google Maps</a>
                               </div>`;
                navPopup.setLatLng(e.latlng).setContent(content).openOn(map);
            });

            // ==========================================
            // 5. ส่วนควบคุมแผนที่ (Controls)
            // ==========================================
            var baseMaps = { "แผนที่พื้นฐาน (OSM)": layer_OpenStreetMap_0 };
            var overlayMaps = {
                "ขอบเขตเทศบาล": layer_Municipal_Boundary_1,
                "โครงข่ายถนน": layer_gis_road_2,
                "เส้นทางน้ำ": layer_gis_waterway_3,
                "ชุมชน": layer_community_Boundary_4,
                "เสาไฟฟ้า ระยะที่ 2": layer_2069_5,
                "เสาไฟฟ้า ระยะที่ 1 (Zone A)": layer_ZoneA_6
            };
            
            L.control.layers(baseMaps, overlayMaps, {collapsed: false}).addTo(map);
            L.control.zoom({ position: 'topleft' }).addTo(map);
            
            var measureControl = new L.Control.Measure({ primaryLengthUnit: 'meters', localization: 'th' });
            measureControl.addTo(map);

        </script>
    </body>
</html>
